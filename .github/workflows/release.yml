name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Base plugin version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          # net8.0 covers Jellyfin 10.9/10.10 + Emby 4.8.
          # net9.0 covers Jellyfin 10.11.
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            raw="${GITHUB_REF_NAME#v}"
            echo "version=${raw}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: |
          python3 build/package.py \
            --version "${{ steps.ver.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --changelog "Release ${{ steps.ver.outputs.version }}"

      - name: Commit manifest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes"
          else
            git commit -m "Update manifest for v${{ steps.ver.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          files: artifacts/*.zip
          generate_release_notes: true
